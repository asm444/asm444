name: metrics

# Regera metrics.svg a partir da arvore de arquivos dos repositorios.
# Semanal porque as contagens mudam devagar; workflow_dispatch para forcar na mao.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    paths:
      - scripts/gen_metrics.py
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate metrics.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/gen_metrics.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- metrics.svg; then
            echo "sem mudanca nas contagens"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.svg
          git commit -m "metrics: atualiza contagens"
          git push
